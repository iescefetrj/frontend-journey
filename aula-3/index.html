<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allicode - Aula 3 e 4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- CABEÇALHO -->
    <header>
        <h1>Capacitações Allicode</h1>
        <h2>CSS + Flexbox e Grid</h2>
    </header>

    <hr>

    <main>
        <!-- SEÇÃO 1: SELETORES -->
        <section>
            <h3>1. Seletores</h3>
            <p class="destaque">Textinho</p>
            <p id="id">Textao</p>
        </section>
        
        <!-- SEÇÃO 2: BOX MODEL -->
        <section>
            <h3>2. Box Model</h3>
            <div class="box">Conteúdo</div>
        </section>

        <!-- SEÇÃO 3: FLEXBOX -->
        <section>
            <h3>3. Flexbox</h3>
            <div class="flex-container">
                <div class="flex-item">A</div>
                <div class="flex-item">B</div>
                <div class="flex-item">C</div>
            </div>
        </section>
        
        <!-- SEÇÃO 4: GRID -->
        <section>
            <h3>4. Grid</h3>
            <div class="grid-container">
                <div class="grid-item"> </div>
                <div class="grid-item"> </div>
                <div class="grid-item"> </div>
                <div class="grid-item"> </div>
            </div>
        </section>
    </main>

    <hr>

    <footer>    
        <p>OBRIGADO</p>
    </footer>

</body>
</html>
